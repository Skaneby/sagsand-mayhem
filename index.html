<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
</script>
<title>Sågsand Mayhem</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0a1a2a; font-family:'Georgia',serif; height:100%; }
  #scene { width:100vw; height:100vh; position:relative; cursor:crosshair; touch-action:none; }
  canvas { display:block; }

  #hud { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
  #topbar { position:absolute; top:12px; left:50%; transform:translateX(-50%); color:#fff; text-align:center; letter-spacing:2px; width:100%; }
  #title { font-size:11px; opacity:0.8; text-transform:uppercase; letter-spacing:3px; text-shadow:0 1px 4px rgba(0,0,0,0.7); }
  #scorebox { font-size:26px; font-weight:bold; margin-top:2px; text-shadow:0 2px 6px rgba(0,0,0,0.7); }
  #subscore { font-size:12px; opacity:0.85; margin-top:2px; text-shadow:0 1px 4px rgba(0,0,0,0.7); }

  #crosshair { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:56px; height:56px; pointer-events:none; z-index:7; }
  #crosshair .ring { position:absolute; inset:0; border-radius:50%; border:1.5px solid rgba(255,255,255,0.7); box-shadow:0 0 6px rgba(0,0,0,0.45); transition:transform 0.15s, border-color 0.1s; }
  #crosshair::before, #crosshair::after { content:''; position:absolute; background:rgba(232,84,58,0.9); }
  #crosshair::before { width:1.5px; height:20px; left:50%; top:50%; transform:translate(-50%,-50%); }
  #crosshair::after { width:20px; height:1.5px; left:50%; top:50%; transform:translate(-50%,-50%); }
  #crosshair .dot { position:absolute; width:4px; height:4px; border-radius:50%; background:#e8543a; left:50%; top:50%; transform:translate(-50%,-50%); }
  #zoomlabel { position:absolute; left:50%; top:calc(50% + 44px); transform:translateX(-50%); color:#fff; font-size:11px; letter-spacing:2px; opacity:0; transition:opacity 0.2s; text-shadow:0 1px 3px rgba(0,0,0,0.7); z-index:8; }
  .floatscore { position:absolute; color:#ffd24a; font-size:22px; font-weight:bold; text-shadow:0 2px 6px rgba(0,0,0,0.8); pointer-events:none; z-index:9; transition:transform 1s ease-out, opacity 1s ease-out; }

  .roundbtn {
    position:absolute; z-index:15; border-radius:50%;
    border:2px solid rgba(255,255,255,0.7); background:rgba(10,20,30,0.5);
    color:#fff; display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  #zoombtn { bottom:78px; right:18px; width:62px; height:62px; font-size:24px; }
  #zoombtn.active { border-color:#e8543a; background:rgba(232,84,58,0.35); }
  #firebtn { bottom:78px; left:18px; width:78px; height:78px; font-size:15px; letter-spacing:1px; border-color:rgba(232,84,58,0.85); color:#ffb09e; }
  #firebtn.firing { background:rgba(232,84,58,0.45); }

  #msg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:88%; color:#fff; text-align:center; z-index:20; pointer-events:none; text-shadow:0 2px 10px rgba(0,0,0,0.85); }
  #msg h1 { font-size:36px; margin:0 0 8px 0; letter-spacing:2px; }
  #msg p { font-size:15px; opacity:0.9; margin:0; line-height:1.5; }

  #overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(6,12,18,0.82); z-index:30; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#fff; text-align:center; cursor:pointer; padding:0 24px; box-sizing:border-box; }
  #overlay h1 { font-size:30px; letter-spacing:2px; margin-bottom:6px; }
  #overlay h2 { font-size:13px; font-weight:normal; opacity:0.65; letter-spacing:3px; text-transform:uppercase; margin-top:0; }
  #overlay p { opacity:0.8; max-width:420px; line-height:1.55; font-size:15px; }
  #overlay .btn { margin-top:24px; padding:14px 38px; border:1px solid #e8543a; color:#e8543a; letter-spacing:2px; text-transform:uppercase; font-size:13px; }
  #hint { position:absolute; bottom:16px; width:100%; text-align:center; color:#fff; opacity:0.7; font-size:11px; letter-spacing:1px; z-index:10; text-shadow:0 1px 4px rgba(0,0,0,0.7); }
</style>
</head>
<body>
<div id="scene">
  <div id="hud">
    <div id="topbar">
      <div id="title">Sågsand Mayhem</div>
      <div id="scorebox">0 p</div>
      <div id="subscore"></div>
    </div>
    <div id="msg"></div>
    <div id="hint"></div>
  </div>
  <div id="crosshair"><div class="ring"></div><div class="dot"></div></div>
  <div id="zoomlabel">ZOOM</div>
  <div class="roundbtn" id="zoombtn">&#9906;</div>
  <div class="roundbtn" id="firebtn">SKJUT</div>
  <div id="overlay">
    <h2>Sågsand Mayhem</h2>
    <h1 id="ovTitle">Nivå 1 — Kikarsikte</h1>
    <p id="ovText">Fem vattenskotrar stör lugnet vid viken. Dra med fingret för att sikta, tryck på kikarknappen för zoom, och tryck SKJUT (eller snabbtryck på skärmen) för att skjuta.</p>
    <div class="btn" id="ovBtn">Starta (med ljud)</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const sceneEl = document.getElementById('scene');
  const scoreboxEl = document.getElementById('scorebox');
  const subscoreEl = document.getElementById('subscore');
  const titleEl = document.getElementById('title');
  const msgEl = document.getElementById('msg');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovText = document.getElementById('ovText');
  const hintEl = document.getElementById('hint');
  const zoomLabel = document.getElementById('zoomlabel');
  const crossRing = document.querySelector('#crosshair .ring');
  const zoombtn = document.getElementById('zoombtn');
  const firebtn = document.getElementById('firebtn');

  // ================= LEVELS =================
  const LEVELS = [
    { name:'Nivå 1 — Kikarsikte', weapon:'rifle', concurrent:1, quota:5, speedMult:1.0, pointsPerHit:100,
      intro:'Fem vattenskotrar stör lugnet vid viken. En i taget. Dra för att sikta, zooma med kikarknappen, skjut med SKJUT-knappen eller snabbtryck.',
      hint:'Dra = sikta · Kikarknapp = zoom · SKJUT / snabbtryck = skjut' },
    { name:'Nivå 2 — Kulspruta', weapon:'mg', concurrent:2, quota:10, speedMult:1.5, pointsPerHit:150,
      intro:'Nu kommer de två i taget — och snabbare. Håll inne SKJUT-knappen för automateld.',
      hint:'Dra = sikta · Håll SKJUT = automateld' },
    { name:'Nivå 3 — Karl Gustav', weapon:'bazooka', concurrent:3, quota:9, speedMult:1.6, pointsPerHit:250,
      intro:'Tre i taget. Granatgeväret skapar explosioner som kan ta flera vattenskotrar i samma smäll.',
      hint:'Dra = sikta · SKJUT = avfyra granat (splash!)' }
  ];
  let levelIdx = 0, hits = 0, points = 0;
  let gameActive = false, betweenLevels = true;

  // ================= AUDIO =================
  let AC = null, masterGain = null, engineNodes = null, ambienceStarted = false;
  function audioInit(){
    if (AC) return;
    AC = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = AC.createGain();
    masterGain.gain.value = 0.85;
    masterGain.connect(AC.destination);
  }

  function startAmbience(){
    if (ambienceStarted || !AC) return;
    ambienceStarted = true;
    const len = AC.sampleRate * 4;
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0;i<len;i++) data[i] = (Math.random()*2-1) * 0.6;
    const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 420;
    const g = AC.createGain(); g.gain.value = 0.30;
    const lfo = AC.createOscillator(); lfo.frequency.value = 0.13;
    const lfoG = AC.createGain(); lfoG.gain.value = 0.12;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    src.connect(lp); lp.connect(g); g.connect(masterGain);
    src.start(); lfo.start();
    // Bright wash so waves are audible on phone speakers
    const src2 = AC.createBufferSource(); src2.buffer = buf; src2.loop = true; src2.playbackRate.value = 1.31;
    const bp = AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 2600; bp.Q.value = 0.5;
    const g2 = AC.createGain(); g2.gain.value = 0.08;
    const lfo2 = AC.createOscillator(); lfo2.frequency.value = 0.09;
    const lfo2G = AC.createGain(); lfo2G.gain.value = 0.055;
    lfo2.connect(lfo2G); lfo2G.connect(g2.gain);
    src2.connect(bp); bp.connect(g2); g2.connect(masterGain);
    src2.start(); lfo2.start();
    function gull(){
      if (!AC) return;
      const o = AC.createOscillator(); o.type='sine';
      const og = AC.createGain(); og.gain.value = 0;
      o.connect(og); og.connect(masterGain);
      const t = AC.currentTime;
      o.frequency.setValueAtTime(1400, t);
      o.frequency.exponentialRampToValueAtTime(2200, t+0.12);
      o.frequency.exponentialRampToValueAtTime(1100, t+0.35);
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(0.10, t+0.05);
      og.gain.exponentialRampToValueAtTime(0.0001, t+0.4);
      o.start(t); o.stop(t+0.45);
      setTimeout(gull, 5000 + Math.random()*9000);
    }
    setTimeout(gull, 2500);
  }

  function startEngine(){
    if (!AC || engineNodes) return;
    const o1 = AC.createOscillator(); o1.type='sawtooth'; o1.frequency.value = 85;
    const o2 = AC.createOscillator(); o2.type='square'; o2.frequency.value = 170;
    const wob = AC.createOscillator(); wob.frequency.value = 11;
    const wobG = AC.createGain(); wobG.gain.value = 9;
    wob.connect(wobG); wobG.connect(o1.frequency);
    const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 900;
    const g = AC.createGain(); g.gain.value = 0;
    const pan = (AC.createStereoPanner ? AC.createStereoPanner() : null);
    o1.connect(lp); o2.connect(lp);
    if (pan){ lp.connect(g); g.connect(pan); pan.connect(masterGain); }
    else { lp.connect(g); g.connect(masterGain); }
    o1.start(); o2.start(); wob.start();
    engineNodes = { g, pan, o1 };
  }
  function setEngineTarget(vol, xNorm, speedFactor){
    if (!engineNodes || !AC) return;
    engineNodes.g.gain.setTargetAtTime(vol, AC.currentTime, 0.12);
    engineNodes.o1.frequency.setTargetAtTime(75 + speedFactor*40, AC.currentTime, 0.2);
    if (engineNodes.pan) engineNodes.pan.pan.setTargetAtTime(Math.max(-1, Math.min(1, xNorm)), AC.currentTime, 0.15);
  }
  function duckEngine(seconds){
    if (!engineNodes || !AC) return;
    const t = AC.currentTime;
    const current = engineNodes.g.gain.value;
    engineNodes.g.gain.setTargetAtTime(current*0.15, t, 0.03);
    engineNodes.g.gain.setTargetAtTime(current, t + seconds, 0.15);
  }

  function sfxShot(quiet){
    if (!AC) return;
    const t = AC.currentTime;
    const len = AC.sampleRate * 0.22;
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.2);
    const src = AC.createBufferSource(); src.buffer = buf;
    const hp = AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 300;
    const g = AC.createGain(); g.gain.value = quiet ? 0.28 : 0.5;
    src.connect(hp); hp.connect(g); g.connect(masterGain);
    src.start(t);
    const o = AC.createOscillator(); o.type='sine';
    const og = AC.createGain();
    o.frequency.setValueAtTime(140, t); o.frequency.exponentialRampToValueAtTime(45, t+0.14);
    og.gain.setValueAtTime(quiet ? 0.25 : 0.45, t); og.gain.exponentialRampToValueAtTime(0.001, t+0.18);
    o.connect(og); og.connect(masterGain);
    o.start(t); o.stop(t+0.2);
  }

  function sfxRocket(){
    if (!AC) return;
    const t = AC.currentTime;
    const len = AC.sampleRate * 0.7;
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * 0.8;
    const src = AC.createBufferSource(); src.buffer = buf;
    const bp = AC.createBiquadFilter(); bp.type='bandpass'; bp.Q.value = 2;
    bp.frequency.setValueAtTime(500, t);
    bp.frequency.exponentialRampToValueAtTime(2200, t+0.65);
    const g = AC.createGain();
    g.gain.setValueAtTime(0.35, t);
    g.gain.exponentialRampToValueAtTime(0.05, t+0.68);
    src.connect(bp); bp.connect(g); g.connect(masterGain);
    src.start(t);
  }

  function sfxExplosion(big){
    if (!AC) return;
    const t = AC.currentTime;
    const dur = big ? 1.3 : 0.9;
    const len = AC.sampleRate * dur;
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 1.6);
    const src = AC.createBufferSource(); src.buffer = buf;
    const lp = AC.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.setValueAtTime(big ? 2200 : 1400, t);
    lp.frequency.exponentialRampToValueAtTime(110, t+dur*0.9);
    const g = AC.createGain(); g.gain.value = big ? 0.7 : 0.55;
    src.connect(lp); lp.connect(g); g.connect(masterGain);
    src.start(t);
  }

  // Scream: loud, wobbling "aaaAAAaaah" glide down — deliberately cartoonish so it cuts through
  function sfxScream(){
    if (!AC) return;
    duckEngine(1.0);
    const t = AC.currentTime + 0.05;
    const o = AC.createOscillator(); o.type='sawtooth';
    const vib = AC.createOscillator(); vib.frequency.value = 26;
    const vibG = AC.createGain(); vibG.gain.value = 45;
    vib.connect(vibG); vibG.connect(o.frequency);
    const g = AC.createGain();
    o.frequency.setValueAtTime(760, t);
    o.frequency.exponentialRampToValueAtTime(880, t+0.10);
    o.frequency.exponentialRampToValueAtTime(150, t+0.9);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.55, t+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.95);
    const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 2600;
    o.connect(lp); lp.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t+1.0);
    vib.start(t); vib.stop(t+1.0);
    setTimeout(()=>{
      if (!AC) return;
      const t2 = AC.currentTime;
      const len = AC.sampleRate*0.5;
      const buf = AC.createBuffer(1,len,AC.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len,1.2);
      const src = AC.createBufferSource(); src.buffer = buf;
      const bp2 = AC.createBiquadFilter(); bp2.type='bandpass'; bp2.frequency.value=2400; bp2.Q.value=0.6;
      const g2 = AC.createGain(); g2.gain.value=0.3;
      src.connect(bp2); bp2.connect(g2); g2.connect(masterGain);
      src.start(t2);
    }, 750);
  }

  // Laugh: loud open "HA-HA-HA-HAA" — square wave with vibrato, no narrow filtering
  function sfxLaugh(dist){
    if (!AC) return;
    duckEngine(0.8);
    const t0 = AC.currentTime;
    const vol = Math.min(0.45, 45/Math.max(dist,20));
    [[0, 1.0, 330],[0.17, 0.85, 300],[0.33, 0.75, 275],[0.49, 0.9, 245]].forEach(([dt, amp, f])=>{
      const o = AC.createOscillator(); o.type='square';
      const g = AC.createGain();
      o.frequency.setValueAtTime(f*1.15, t0+dt);
      o.frequency.exponentialRampToValueAtTime(f*0.72, t0+dt+0.14);
      g.gain.setValueAtTime(0.0001, t0+dt);
      g.gain.exponentialRampToValueAtTime(vol*amp, t0+dt+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dt+0.16);
      const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1800;
      o.connect(lp); lp.connect(g); g.connect(masterGain);
      o.start(t0+dt); o.stop(t0+dt+0.18);
    });
  }

  // ================= THREE =================
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 500);
  camera.position.set(0,0,0);

  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  sceneEl.insertBefore(renderer.domElement, sceneEl.firstChild);

  scene.add(new THREE.AmbientLight(0xffffff, 0.9));
  const sun = new THREE.DirectionalLight(0xfff2d9, 0.9);
  sun.position.set(-30,50,20);
  scene.add(sun);

  // ---------- PHOTO BACKDROP ----------
  const R = 120;
  const H_FOV = 92 * Math.PI/180;
  const V_FOV = H_FOV * (896/1190);
  const HORIZON_FRAC = 0.47;
  const pitchTop = V_FOV * HORIZON_FRAC;
  const pitchBottom = -V_FOV * (1-HORIZON_FRAC);

  const COLS = 48, ROWS = 32;
  const positions = [], uvs = [], indices = [];
  for (let r=0; r<=ROWS; r++){
    const v = r/ROWS;
    const pt = pitchTop + (pitchBottom - pitchTop)*v;
    for (let c=0; c<=COLS; c++){
      const u = c/COLS;
      const yw = -H_FOV/2 + H_FOV*u;
      positions.push(Math.sin(yw)*Math.cos(pt)*R, Math.sin(pt)*R, -Math.cos(yw)*Math.cos(pt)*R);
      uvs.push(u, 1-v);
    }
  }
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++){
    const a = r*(COLS+1)+c, b = a+1, d2 = a+COLS+1, e = d2+1;
    indices.push(a,d2,b, b,d2,e);
  }
  const screenGeo = new THREE.BufferGeometry();
  screenGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));

  // ---------- JETSKI MODEL ----------
  function makeJetskiMesh(){
    const g = new THREE.Group();
    const blue = new THREE.MeshPhongMaterial({ color:0x2a4d8f, shininess:80 });
    const darkBlue = new THREE.MeshPhongMaterial({ color:0x16223f });
    const orange = new THREE.MeshPhongMaterial({ color:0xe8772f, shininess:90 });
    const gray = new THREE.MeshPhongMaterial({ color:0x8a9199 });
    const black = new THREE.MeshPhongMaterial({ color:0x111111 });
    const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 1.0, 4.6, 4), darkBlue);
    lower.rotation.x = Math.PI/2; lower.rotation.z = Math.PI/4;
    lower.scale.set(1.15, 1, 0.42); lower.position.y = 0.28; g.add(lower);
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.9, 4.4, 4), blue);
    upper.rotation.x = Math.PI/2; upper.rotation.z = Math.PI/4;
    upper.scale.set(1.05, 1, 0.5); upper.position.set(0, 0.62, 0.1); g.add(upper);
    const nose = new THREE.Mesh(new THREE.ConeGeometry(0.62, 1.4, 4), blue);
    nose.rotation.x = Math.PI/2; nose.rotation.y = Math.PI/4;
    nose.scale.set(1.4, 1, 0.55); nose.position.set(0, 0.55, 2.8); g.add(nose);
    const stripeL = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.18, 3.6), orange);
    stripeL.position.set(-0.92, 0.62, 0.2); g.add(stripeL);
    const stripeR = stripeL.clone(); stripeR.position.x = 0.92; g.add(stripeR);
    const seat = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.32, 2.0), gray);
    seat.position.set(0, 1.02, -0.5); g.add(seat);
    const console_ = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.5, 0.8), blue);
    console_.position.set(0, 1.05, 0.9); console_.rotation.x = -0.25; g.add(console_);
    const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.1, 6), black);
    bar.rotation.z = Math.PI/2; bar.position.set(0, 1.38, 0.85); g.add(bar);
    const legs = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.4, 0.9), new THREE.MeshPhongMaterial({color:0x2a2a2a}));
    legs.position.set(0, 1.28, -0.35); g.add(legs);
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.34, 0.85, 8), new THREE.MeshPhongMaterial({color:0x1c1c1c}));
    torso.position.set(0, 1.85, -0.15); torso.rotation.x = 0.35; g.add(torso);
    const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.85, 6), new THREE.MeshPhongMaterial({color:0xf2f2f2}));
    armL.position.set(-0.32, 1.75, 0.35); armL.rotation.x = 1.0; armL.rotation.z = 0.25; g.add(armL);
    const armR = armL.clone(); armR.position.x = 0.32; armR.rotation.z = -0.25; g.add(armR);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 10), new THREE.MeshPhongMaterial({color:0xdba97a}));
    head.position.set(0, 2.32, 0.1); g.add(head);
    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.23, 10, 10, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshPhongMaterial({color:0x6b4a2a}));
    hair.position.set(0, 2.36, 0.1); g.add(hair);
    return g;
  }

  // Pool of jetskis (max 3 concurrent in level 3)
  const jetskis = [];
  for (let i=0;i<3;i++){
    const mesh = makeJetskiMesh();
    mesh.visible = false;
    scene.add(mesh);
    jetskis.push({ mesh, alive:false, state:null, laughTimer: 0 });
  }

  function waterY(z){ return -Math.abs(z) * 0.075; }

  function spawnOne(j){
    const lvl = LEVELS[levelIdx];
    const cz = -(95 + Math.random()*30);
    const centerYaw = (6 + Math.random()*16) * Math.PI/180;
    const cx = Math.tan(centerYaw) * Math.abs(cz);
    const rx = 14 + Math.random()*14;
    const rz = 7 + Math.random()*8;
    const dir = Math.random() < 0.5 ? 1 : -1;
    j.state = {
      cx, cz, rx, rz,
      speed: (0.55 + Math.random()*0.25) * dir * lvl.speedMult,
      angle: Math.random()*Math.PI*2,
      t: 0, lifetime: 11 + Math.random()*4,
      leaving: false, pos: null
    };
    j.alive = true;
    j.mesh.visible = true;
    j.laughTimer = 1.5 + Math.random()*3;
  }

  function killJetski(j, awardPoints){
    j.alive = false;
    j.mesh.visible = false;
    explodeAt(j.mesh.position.clone(), false);
    sfxScream();
    if (awardPoints){
      const lvl = LEVELS[levelIdx];
      hits++;
      points += lvl.pointsPerHit;
      floatScore('+' + lvl.pointsPerHit);
      updateHud();
    }
  }

  function updateJetskis(dt){
    const lvl = LEVELS[levelIdx];
    let aliveCount = 0, nearestDist = Infinity, nearestX = 0, nearestSpeed = 0;

    jetskis.forEach(j=>{
      if (!j.alive) return;
      aliveCount++;
      const s = j.state;
      s.t += dt;
      let x, z, vx, vz;
      if (!s.leaving){
        s.angle += s.speed * dt;
        x = s.cx + Math.cos(s.angle) * s.rx;
        z = s.cz + Math.sin(s.angle) * s.rz;
        vx = -Math.sin(s.angle) * s.rx * s.speed;
        vz =  Math.cos(s.angle) * s.rz * s.speed;
        if (s.t > s.lifetime){
          s.leaving = true;
          s.leaveDir = s.cx > 0 ? 1 : -1;
          s.pos = { x, z };
        }
      } else {
        s.pos.x += s.leaveDir * 26 * dt;
        x = s.pos.x; z = s.pos.z;
        vx = s.leaveDir; vz = 0;
        if (Math.abs(Math.atan2(x, Math.abs(z))) > H_FOV/2 + 0.15){
          j.alive = false; j.mesh.visible = false;
          return;
        }
      }
      const y = waterY(z) + Math.sin(performance.now()*0.006 + s.cx)*0.15;
      j.mesh.position.set(x, y, z);
      j.mesh.rotation.y = Math.atan2(vx, vz);
      j.mesh.rotation.z = -s.speed * 0.2;

      const dist = Math.sqrt(x*x + z*z);
      if (dist < nearestDist){ nearestDist = dist; nearestX = Math.atan2(x, Math.abs(z)) / (H_FOV/2); nearestSpeed = Math.abs(s.speed); }

      j.laughTimer -= dt;
      if (j.laughTimer <= 0){
        sfxLaugh(dist);
        j.laughTimer = 3 + Math.random()*3;
      }

      if (Math.random() < 0.4) spawnWakeDot(x, y, z, vx, vz);
    });

    // Engine follows the nearest jetski; silent when none alive
    if (aliveCount > 0) setEngineTarget(Math.min(0.16, 15/Math.max(nearestDist,20)), nearestX, nearestSpeed);
    else setEngineTarget(0, 0, 0);

    // Respawn to maintain concurrency until quota is met
    const remaining = lvl.quota - hits;
    const need = Math.min(lvl.concurrent, remaining) - aliveCount;
    for (let i=0; i<need; i++){
      const free = jetskis.find(j=>!j.alive);
      if (free && !free.pendingSpawn){
        free.pendingSpawn = true;
        setTimeout(()=>{ free.pendingSpawn = false; if (gameActive) spawnOne(free); }, 600 + Math.random()*900);
      }
    }
  }

  // ---------- WAKE ----------
  const wakeDots = [];
  const wakeGroup = new THREE.Group(); scene.add(wakeGroup);
  for (let i=0;i<24;i++){
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.3,6,6), new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0}));
    wakeGroup.add(dot); wakeDots.push({mesh:dot, life:0});
  }
  let wakeIdx = 0;
  function spawnWakeDot(x,y,z,vx,vz){
    const d = wakeDots[wakeIdx]; wakeIdx = (wakeIdx+1)%wakeDots.length;
    const sp = Math.hypot(vx, vz) || 1;
    d.mesh.position.set(x - (vx/sp)*2.6, y - 0.4, z - (vz/sp)*2.6);
    d.mesh.scale.set(1,0.5,1);
    d.mesh.material.opacity = 0.55; d.life = 1;
  }
  function updateWake(dt){
    wakeDots.forEach(d=>{
      if (d.life > 0){
        d.life -= dt*0.6;
        d.mesh.material.opacity = Math.max(0, d.life*0.55);
        d.mesh.scale.multiplyScalar(1 + dt*0.6);
      }
    });
  }

  // ---------- EXPLOSIONS ----------
  const explosionGroup = new THREE.Group(); scene.add(explosionGroup);
  function explodeAt(pos, big){
    const n = big ? 30 : 16;
    for (let i=0;i<n;i++){
      const p = new THREE.Mesh(new THREE.SphereGeometry(big?0.4:0.22,6,6),
        new THREE.MeshBasicMaterial({color: Math.random()<0.5 ? 0xff8844 : 0xffffff, transparent:true}));
      p.position.copy(pos);
      const sp = big ? 16 : 10;
      p.userData.vel = new THREE.Vector3((Math.random()-0.5)*sp, Math.random()*sp*0.7+2, (Math.random()-0.5)*sp);
      p.userData.life = 1;
      explosionGroup.add(p);
    }
  }
  function updateExplosions(dt){
    explosionGroup.children.slice().forEach(p=>{
      p.userData.life -= dt*1.1;
      if (p.userData.life <= 0){ explosionGroup.remove(p); return; }
      p.userData.vel.y -= dt*10;
      p.position.addScaledVector(p.userData.vel, dt);
      p.material.opacity = p.userData.life;
      p.scale.setScalar(Math.max(0.05, p.userData.life));
    });
  }

  // ---------- ROCKETS (level 3) ----------
  const rockets = [];
  function fireRocket(){
    sfxRocket();
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    // Explode where the aim ray meets the water surface (approximate plane), clamped to a sane range
    let t = dir.y < -0.005 ? (-7 / dir.y) : 130;
    t = Math.max(60, Math.min(140, t));
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), new THREE.MeshBasicMaterial({ color:0x333333 }));
    mesh.position.set(dir.x*2, dir.y*2 - 0.6, dir.z*2);
    scene.add(mesh);
    rockets.push({ mesh, dir, traveled: 0, targetDist: t, speed: 95 });
  }
  function updateRockets(dt){
    for (let i=rockets.length-1; i>=0; i--){
      const r = rockets[i];
      const step = r.speed * dt;
      r.traveled += step;
      r.mesh.position.addScaledVector(r.dir, step);
      if (r.traveled >= r.targetDist){
        scene.remove(r.mesh);
        rockets.splice(i,1);
        const impact = r.mesh.position;
        explodeAt(impact, true);
        sfxExplosion(true);
        // Splash damage: every jetski within blast radius goes down
        let any = false;
        jetskis.forEach(j=>{
          if (j.alive && j.mesh.position.distanceTo(impact) < 14){
            killJetski(j, true);
            any = true;
          }
        });
        if (any) checkLevelDone();
      }
    }
  }

  // ---------- CONTROLS ----------
  let yaw = 0, pitch = -0.03;
  let yawLim = 0.5, pitchUpLim = 0.2, pitchDownLim = -0.2;
  let fov = 60, targetFov = 60;
  let scopeOn = false;

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  // Limits derived from the camera's actual field of view so the frustum can never leave the photo.
  // This is what keeps the black outside the backdrop from ever being visible, on any screen shape.
  function updateLimits(){
    const vHalf = (camera.fov * Math.PI/180) / 2;
    const hHalf = Math.atan(Math.tan(vHalf) * camera.aspect);
    const margin = 0.02;
    yawLim = Math.max(0, H_FOV/2 - hHalf - margin);
    let up = pitchTop - vHalf - margin;
    let down = pitchBottom + vHalf + margin;
    if (up < down){ const mid = (pitchTop + pitchBottom)/2; up = mid; down = mid; }
    pitchUpLim = up; pitchDownLim = down;
    yaw = clamp(yaw, -yawLim, yawLim);
    pitch = clamp(pitch, pitchDownLim, pitchUpLim);
  }

  function applyCamera(){
    camera.rotation.order = 'YXZ';
    camera.rotation.y = -yaw;
    camera.rotation.x = pitch;
    camera.fov = fov;
    camera.updateProjectionMatrix();
    updateLimits();
  }
  applyCamera();

  // Touch: drag pans, quick tap shoots (level 1 & 3), pinch zooms
  let touchState = null, pinchStart = null;
  sceneEl.addEventListener('touchstart', (e)=>{
    if (overlay.style.display !== 'none') return;
    e.preventDefault();
    if (e.touches.length === 1){
      const t = e.touches[0];
      touchState = { id: t.identifier, x: t.clientX, y: t.clientY, moved: 0, t0: performance.now() };
    } else if (e.touches.length === 2){
      touchState = null;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchStart = { dist: Math.hypot(dx,dy), fov: targetFov };
    }
  }, { passive:false });

  sceneEl.addEventListener('touchmove', (e)=>{
    if (overlay.style.display !== 'none') return;
    e.preventDefault();
    if (e.touches.length === 2 && pinchStart){
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      targetFov = clamp(pinchStart.fov / (Math.hypot(dx,dy) / pinchStart.dist), 14, 60);
      return;
    }
    if (!touchState) return;
    const t = Array.from(e.touches).find(t => t.identifier === touchState.id);
    if (!t) return;
    const dx = t.clientX - touchState.x, dy = t.clientY - touchState.y;
    touchState.x = t.clientX; touchState.y = t.clientY;
    touchState.moved += Math.abs(dx) + Math.abs(dy);
    const sens = 0.0028 * (fov/60);
    yaw = clamp(yaw + dx*sens, -yawLim, yawLim);
    pitch = clamp(pitch + dy*sens, pitchDownLim, pitchUpLim);
    applyCamera();
  }, { passive:false });

  sceneEl.addEventListener('touchend', (e)=>{
    if (overlay.style.display !== 'none') return;
    e.preventDefault();
    if (e.touches.length < 2) pinchStart = null;
    if (!touchState) return;
    const stillDown = Array.from(e.touches).some(t => t.identifier === touchState.id);
    if (!stillDown){
      const quick = (performance.now() - touchState.t0) < 350;
      if (touchState.moved < 12 && quick) triggerFire();
      touchState = null;
    }
  }, { passive:false });

  function setScope(on){
    scopeOn = on;
    targetFov = on ? 18 : 60;
    zoombtn.classList.toggle('active', on);
  }
  zoombtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); e.stopPropagation(); setScope(!scopeOn); }, { passive:false });
  zoombtn.addEventListener('mousedown', (e)=>{ e.preventDefault(); e.stopPropagation(); setScope(!scopeOn); });

  // Fire button: tap = one shot/rocket; hold = autofire for the machine gun
  let fireHeld = false, mgCooldown = 0;
  function triggerFire(){
    if (!gameActive) return;
    const w = LEVELS[levelIdx].weapon;
    if (w === 'rifle') shootRay(false);
    else if (w === 'bazooka') fireRocket();
    else if (w === 'mg') shootRay(true); // single tap fires one burst round too
  }
  firebtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); e.stopPropagation(); fireHeld = true; firebtn.classList.add('firing'); triggerFire(); }, { passive:false });
  firebtn.addEventListener('touchend', (e)=>{ e.preventDefault(); fireHeld = false; firebtn.classList.remove('firing'); }, { passive:false });
  firebtn.addEventListener('mousedown', (e)=>{ e.stopPropagation(); fireHeld = true; firebtn.classList.add('firing'); triggerFire(); });
  window.addEventListener('mouseup', ()=>{ fireHeld = false; firebtn.classList.remove('firing'); });

  // Mouse fallback (desktop)
  let usingTouch = false;
  sceneEl.addEventListener('touchstart', ()=>{ usingTouch = true; }, { once:true, passive:true });
  window.addEventListener('mousemove', (e)=>{
    if (usingTouch) return;
    const nx = (e.clientX / window.innerWidth) * 2 - 1;
    const ny = (e.clientY / window.innerHeight) * 2 - 1;
    yaw = clamp(nx * yawLim, -yawLim, yawLim);
    pitch = clamp(-ny * Math.max(Math.abs(pitchUpLim), Math.abs(pitchDownLim)), pitchDownLim, pitchUpLim);
    applyCamera();
  });
  sceneEl.addEventListener('contextmenu', (e)=> e.preventDefault());
  sceneEl.addEventListener('mousedown', (e)=>{
    if (usingTouch || overlay.style.display !== 'none') return;
    if (e.button === 2){ targetFov = 18; return; }
    if (e.button === 0){ fireHeld = true; triggerFire(); }
  });
  window.addEventListener('mouseup', (e)=>{ if (!usingTouch && e.button === 2) targetFov = 60; });
  window.addEventListener('keydown', (e)=>{ if (e.key === 'Shift') targetFov = 18; });
  window.addEventListener('keyup', (e)=>{ if (e.key === 'Shift') targetFov = 60; });
  sceneEl.addEventListener('wheel', (e)=>{
    e.preventDefault();
    targetFov = clamp(targetFov + e.deltaY*0.03, 14, 60);
  }, { passive:false });

  function updateZoom(dt){
    if (Math.abs(fov - targetFov) > 0.05){
      fov += (targetFov - fov) * Math.min(1, dt*10);
      applyCamera();
    }
    const zoomed = fov < 55;
    zoomLabel.style.opacity = zoomed ? 0.8 : 0;
    zoomLabel.textContent = 'ZOOM ' + (60/fov).toFixed(1) + 'x';
    crossRing.style.transform = 'scale(' + (zoomed ? 1.35 : 1) + ')';
  }

  // ---------- SHOOTING ----------
  const raycaster = new THREE.Raycaster();
  function shootRay(quiet){
    if (!gameActive) return;
    sfxShot(quiet);
    // MG spread: slight random jitter around the crosshair
    const jitter = quiet ? 0.02 : 0;
    const ndc = new THREE.Vector2((Math.random()-0.5)*jitter*2, (Math.random()-0.5)*jitter*2);
    raycaster.setFromCamera(ndc, camera);
    let hit = false;
    jetskis.forEach(j=>{
      if (hit || !j.alive) return;
      const dist = raycaster.ray.distanceToPoint(j.mesh.position);
      const hitRadius = 3.4 * (fov/60) + 1.6;
      if (dist < hitRadius){
        killJetski(j, true);
        hit = true;
      }
    });
    if (hit) checkLevelDone();
    else {
      crossRing.style.borderColor = 'rgba(232,84,58,0.9)';
      setTimeout(()=> crossRing.style.borderColor = 'rgba(255,255,255,0.7)', 90);
    }
  }

  // ---------- HUD & FLOW ----------
  function updateHud(){
    const lvl = LEVELS[levelIdx];
    titleEl.textContent = 'Sågsand Mayhem · ' + lvl.name;
    scoreboxEl.textContent = points + ' p';
    subscoreEl.textContent = hits + ' / ' + lvl.quota + ' vattenskotrar';
    hintEl.textContent = lvl.hint;
  }

  function floatScore(text){
    const el = document.createElement('div');
    el.className = 'floatscore';
    el.textContent = text;
    el.style.left = (46 + Math.random()*8) + '%'; el.style.top = '44%';
    sceneEl.appendChild(el);
    requestAnimationFrame(()=>{ el.style.transform = 'translateY(-70px)'; el.style.opacity = '0'; });
    setTimeout(()=> el.remove(), 1100);
  }

  function checkLevelDone(){
    const lvl = LEVELS[levelIdx];
    if (hits < lvl.quota) return;
    gameActive = false;
    setEngineTarget(0,0,0);
    jetskis.forEach(j=>{ j.alive=false; j.mesh.visible=false; });
    if (levelIdx < LEVELS.length - 1){
      setTimeout(()=> showOverlay(
        lvl.name + ' klar!',
        'Du har ' + points + ' poäng. ' + LEVELS[levelIdx+1].intro,
        'Starta ' + LEVELS[levelIdx+1].name.split(' — ')[0],
        ()=>{ levelIdx++; hits = 0; startLevel(); }
      ), 1200);
    } else {
      setTimeout(()=> showOverlay(
        'Spelet klart!',
        'Viken är återställd till sitt lugn. Slutpoäng: ' + points + ' poäng.',
        'Spela igen',
        ()=>{ levelIdx = 0; hits = 0; points = 0; startLevel(); }
      ), 1200);
    }
  }

  function showOverlay(title, text, btnText, onStart){
    ovTitle.textContent = title;
    ovText.textContent = text;
    document.getElementById('ovBtn').textContent = btnText;
    overlay.style.display = 'flex';
    overlayAction = onStart;
  }

  let overlayAction = null;
  function overlayGo(){
    if (!overlayAction) return;
    const fn = overlayAction; overlayAction = null;
    overlay.style.display = 'none';
    audioInit();
    startAmbience();
    startEngine();
    fn();
  }
  overlay.addEventListener('click', overlayGo);
  overlay.addEventListener('touchend', (e)=>{ e.preventDefault(); overlayGo(); }, { passive:false });

  function startLevel(){
    updateHud();
    msgEl.innerHTML = '';
    gameActive = true;
    const lvl = LEVELS[levelIdx];
    for (let i=0; i<lvl.concurrent; i++){
      setTimeout(()=>{ if (gameActive) spawnOne(jetskis[i]); }, i*800);
    }
  }

  // Initial overlay wires to level 1
  overlayAction = ()=>{ levelIdx = 0; hits = 0; points = 0; startLevel(); };

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    renderer.setSize(window.innerWidth, window.innerHeight);
    applyCamera();
  });

  // ---------- LOOP ----------
  let last = performance.now();
  function animate(now){
    requestAnimationFrame(animate);
    const dt = Math.min((now-last)/1000, 0.05);
    last = now;
    if (gameActive){
      updateJetskis(dt);
      // Machine gun autofire while the button is held
      if (LEVELS[levelIdx].weapon === 'mg' && fireHeld){
        mgCooldown -= dt;
        if (mgCooldown <= 0){ shootRay(true); mgCooldown = 0.13; }
      }
    }
    updateRockets(dt);
    updateZoom(dt);
    updateWake(dt);
    updateExplosions(dt);
    renderer.render(scene, camera);
  }
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
